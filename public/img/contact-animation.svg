<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff7aa8"/>
      <stop offset="50%" stop-color="#60e6d9"/>
      <stop offset="100%" stop-color="#ffb36b"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#08101B" rx="12"/>
  <g transform="translate(50,40)">
    <circle cx="60" cy="60" r="40" fill="url(#g)">
      <animate attributeName="r" values="36;44;36" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <rect x="140" y="30" width="220" height="60" rx="10" fill="rgba(255,255,255,0.06)">
      <animate attributeName="x" values="140;130;140" dur="3s" repeatCount="indefinite"/>
    </rect>
    <g transform="translate(160,40)">
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#101827" stroke="rgba(255,255,255,0.06)"/>
      <rect x="56" y="0" width="120" height="40" rx="8" fill="rgba(255,255,255,0.03)"/>
    </g>
    <g transform="translate(30,140)" fill="none" stroke="url(#g)" stroke-width="6">
      <path d="M0 20 C60 -30 140 60 200 20" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0,300;150,150;0,300" dur="4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  <text x="50%" y="92%" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9aa3ad" text-anchor="middle">Let’s chat — send a quick message</text>
</svg>
